<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tower Defense</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #e0e0e0;
        }
        #gameCanvas {
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(100,180,255,0.15), 0 8px 32px rgba(0,0,0,0.6);
            touch-action: none;
            cursor: crosshair;
            display: block;
        }
        /* 모바일 대응 */
        @media (max-width: 768px), (max-height: 500px) {
            body {
                position: fixed;
                width: 100%;
                height: 100%;
                justify-content: flex-start;
                padding: 0;
            }
            #gameCanvas {
                border-radius: 0;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
    <script src="game.js"></script>
</body>
</html>
